<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List - PriorityCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="images/logo.png" alt="Hospital Logo">
            <h2>PriorityCare System</h2>
        </div>
        <ul class="nav-links">
            <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="register.html"><i class="fas fa-user-plus"></i> Register Patient</a></li>
            <li><a href="patients.html" class="active"><i class="fas fa-list-ul"></i> Patient List</a></li>
            <li><a href="serve.html"><i class="fas fa-stethoscope"></i> Serve Patient</a></li>
        </ul>
    </nav>

    <main>
        <div class="card-container" style="max-width: 1000px;">
            <h2 class="card-title"><i class="fas fa-list-ul"></i> Admission Queue</h2>

            <div class="table-responsive">
                <table id="patientTable">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> ID</th>
                            <th><i class="fas fa-user-injured"></i> Name</th>
                            <th><i class="fas fa-calendar-alt"></i> Age</th>
                            <th><i class="fas fa-notes-medical"></i> Symptoms</th>
                            <th><i class="fas fa-exclamation-triangle"></i> Priority</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows populated by script.js -->
                    </tbody>
                </table>
            </div>

            <div style="margin-top: 20px; text-align: right;">
                <a href="register.html" class="btn" style="width: auto; display: inline-block;">+ Add Another
                    Patient</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PriorityCare Hospital Management System. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
